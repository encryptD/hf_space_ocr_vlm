name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hf-space-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  push-to-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install

      - name: Push main branch to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_SPACE_REPO_DEFAULT: encryptD/ocr_vlm_aggr
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "Missing required GitHub secret: HF_TOKEN"
            exit 1
          fi

          SPACE_REPO="${HF_SPACE_REPO:-${HF_SPACE_REPO_DEFAULT}}"
          if [ -z "${SPACE_REPO}" ]; then
            echo "Missing Hugging Face Space repo id. Set repository variable HF_SPACE_REPO."
            exit 1
          fi
          HF_NAMESPACE="${SPACE_REPO%%/*}"
          HF_REMOTE_URL="https://${HF_NAMESPACE}:${HF_TOKEN}@huggingface.co/spaces/${SPACE_REPO}"

          echo "Target Hugging Face Space: ${SPACE_REPO}"
          GIT_TERMINAL_PROMPT=0 git ls-remote "${HF_REMOTE_URL}" HEAD
          GIT_TERMINAL_PROMPT=0 git push --force "${HF_REMOTE_URL}" HEAD:main
